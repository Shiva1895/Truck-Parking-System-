<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Driver Registration</h2>

<form id="registerForm">

<input type="text"
       id="name"
       placeholder="Driver Name"
       required>

<input type="text"
       id="truckNumber"
       placeholder="Truck Number"
       required>

<input type="email"
       id="email"
       placeholder="Email"
       required>

<input type="password"
       id="password"
       placeholder="Password"
       required>

<button type="submit">
Register
</button>

</form>

<a href="login.html">
Already Have Account?
</a>

</div>

<script src="script.js"></script>

</body>
</html>
