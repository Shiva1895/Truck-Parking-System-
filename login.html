<!DOCTYPE html>
<html>
<head>
    <title>Driver Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Truck Parking System</h1>

    <h2>Driver Login</h2>

    <form id="loginForm">

        <input type="email"
               id="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">Login</button>

    </form>

    <p>
        New User?
        <a href="register.html">Register Here</a>
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
